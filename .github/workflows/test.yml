name: Test

on:
  push:
  pull_request:

jobs:
  go-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check Go Coverage
        run: bash scripts/check-go-coverage.sh
